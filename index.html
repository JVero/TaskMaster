<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Personal research project tracker" />
    <meta name="theme-color" content="#B8533A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&display=swap" rel="stylesheet" />
    <title>Project Tracker</title>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      button, a, select, input, [onClick] { touch-action: manipulation; }
      ::selection { background: rgba(184, 83, 58, 0.15); }
      body { margin: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      input::placeholder, textarea::placeholder { color: #C4BFB6; }
      @media (prefers-color-scheme: dark) {
        input::placeholder, textarea::placeholder { color: #57524A; }
      }
      /* Micro-animations */
      @keyframes focusPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      @keyframes focusBannerIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pillFadeIn {
        from { opacity: 0; transform: translateY(-4px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes toastIn {
        from { opacity: 0; transform: translateX(-50%) translateY(12px); }
        to { opacity: 1; transform: translateX(-50%) translateY(0); }
      }
      @keyframes overlayIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes modalIn {
        from { opacity: 0; transform: scale(0.97) translateY(8px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
    </style>
  </head>
  <body>
    <script>
      // Set background before paint to prevent flash on refresh
      try {
        var d = localStorage.getItem('tracker-dark') === '1';
        document.body.style.background = d ? '#1A1714' : '#F7F5F0';
      } catch(e) {
        document.body.style.background = '#F7F5F0';
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
